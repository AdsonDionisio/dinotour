{% extends 'base.html' %}
{% block content %}
<div class="map-wrapper">
    <div id="map"></div>
</div>

<!-- Template escondido para o Card de Detalhes Leaflet (Popup Base) -->
<template id="popup-template">
    <div class="site-card">
        <div class="site-card-image">
            {photo_content}
        </div>
        <div class="site-card-content">
            <h2 class="site-title">{title}</h2>
            <p class="site-desc">{desc}</p>
            <div class="site-actions">
                <a href="{youtube_link}" target="_blank" class="btn-primary">VER NO YOUTUBE</a>
                <a href="https://youtu.be/iXG8eWvZiTU" target="_blank" class="tutorial-link"
                    title="Como ativar qualidade 360 no celular">&#9432;
                    Tutorial aumentar qualidade 360</a>
            </div>
            <div style="margin-top: 10px; display:flex; align-items:center; gap:5px;">
                <a href="{gmaps_link}" target="_blank" class="btn-secondary">🛤️ Traçar Rota</a>
                {vr_button}
            </div>
        </div>
    </div>
</template>

{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="{{ url_for('static', filename='js/map.js') }}"></script>
{% endblock %}

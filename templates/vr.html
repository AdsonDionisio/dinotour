<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>360 VR - {{ site.name }} - Sousa Arqueopaleo</title>
    <!-- A-Frame library for WebVR -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      #back-btn {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 9999;
        background: rgba(0,0,0,0.6);
        color: white;
        padding: 10px 20px;
        text-decoration: none;
        border-radius: 5px;
        font-family: 'Inter', Arial, sans-serif;
        font-weight: bold;
      }
      #back-btn:hover {
        background: rgba(0,0,0,0.8);
      }
    </style>
  </head>
  <body>
    <a href="#" onclick="window.close(); return false;" id="back-btn">⬅ Voltar para o Mapa</a>
    <a-scene>
      <a-sky src="{{ url_for('static', filename='vr_uploads/' + site.image_vr_filename) }}" rotation="0 -130 0"></a-sky>
    </a-scene>
  </body>
</html>

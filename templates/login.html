{% extends "base.html" %}
{% block content %}
<div class="admin-container" style="display:flex; justify-content:center; align-items:center; flex-direction:column; background: #eaebd8;">
    <div style="background:var(--header-bg); padding:30px; border-radius:10px; box-shadow:0 10px 20px rgba(0,0,0,0.2);">
    <h2 style="color:var(--text-color); margin-bottom: 20px; text-align:center;">Acesso Administrativo</h2>
    <form class="admin-form" method="POST" action="{{ url_for('login') }}">
        <input type="text" name="username" placeholder="Usuário" required style="width: 300px;">
        <input type="password" name="password" placeholder="Senha" required style="width: 300px;">
        <button type="submit" class="btn-primary" style="margin-top:10px; cursor:pointer; width:300px;">Entrar</button>
    </form>
    </div>
</div>
{% endblock %}
